<!doctype html>
<html lang="en">

	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Arabic to Roman numerals converter</title>
		<link rel="stylesheet" href="styles.css" />

		<!--* Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Tagesschrift&family=Kanchenjunga&display=swap"
			rel="stylesheet" />
	</head>

	<body>
		<h1 class="title">
			<span id="from-to">Arabic to Roman</span><br />
			<span id="functionality">numerals converter</span>
		</h1>

		<!-- * Form -->
		<form id="converter" class="input container">
			<label for="input-num">Integer to convert:</label>
			<input
				id="input-num"
				type="number"
				required />
			<button
				id="convert-btn"
				type="button">
					Convert
			</button>
		</form>

		<!-- * Output -->
		<div class="down-arrow hidden">
			<!-- Visual arrow revealed on result -->
		</div>
		<output
			class="output container hidden"
			name="result"
			form="converter"
			for="input-num">
		<!-- Display convertion's result -->
		</output>

		<script src="script.js"></script>
	</body>
</html>
